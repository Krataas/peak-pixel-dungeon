name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Install Xcode Command Line Tools
        run: sudo xcode-select --switch /Applications/Xcode.app

      - name: Build iOS with RoboVM
        run: ./gradlew ios:build

      - name: Manually package IPA from compiled output
        run: |
          # RoboVM puts the compiled .app inside ios/build/robovm after ios:build
          BUILD_DIR="ios/build/robovm"
          
          echo "=== Full ios/build tree ==="
          find ios/build -maxdepth 8 2>/dev/null || echo "nothing in ios/build"

          echo "=== All .app directories ==="
          find . -name "*.app" -type d 2>/dev/null

          # Find the .app however deep it is
          APP=$(find . -name "*.app" -type d | head -1)

          if [ -n "$APP" ]; then
            echo "Packaging $APP into IPA..."
            mkdir -p Payload
            cp -r "$APP" Payload/
            zip -r ShatteredPD.ipa Payload/
            echo "Done! IPA created."
          else
            echo "No .app found - build may have failed silently"
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ShatteredPD-ios
          path: ShatteredPD.ipa
          retention-days: 7
