name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Set up Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Create self-signed signing identity
        run: |
          security create-keychain -p "password" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "password" build.keychain
          security set-keychain-settings build.keychain

          # Generate self-signed cert
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout fake.key -out fake.crt \
            -subj "/CN=iPhone Developer: Fake User (XXXXXXXXXX)"

          # Export to p12 with explicit password
          openssl pkcs12 -export \
            -inkey fake.key \
            -in fake.crt \
            -out fake.p12 \
            -passout pass:password \
            -legacy

          # Import into keychain with same password
          security import fake.p12 \
            -k build.keychain \
            -P "password" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -A

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "password" build.keychain

          # Verify it imported
          security find-identity -v build.keychain

      - name: Create fake provisioning profile
        run: |
          # Create a minimal fake mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          
          UUID="FAKEFAKE-FAKE-FAKE-FAKE-FAKEFAKEFAKE"
          
          cat > /tmp/fake.mobileprovision << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>AppIDName</key>
            <string>ShatteredPD</string>
            <key>ApplicationIdentifierPrefix</key>
            <array><string>XXXXXXXXXX</string></array>
            <key>TeamName</key>
            <string>Fake Team</string>
            <key>TeamIdentifier</key>
            <array><string>XXXXXXXXXX</string></array>
            <key>Entitlements</key>
            <dict>
              <key>application-identifier</key>
              <string>XXXXXXXXXX.com.shatteredpixel.shatteredpixeldungeon.apple</string>
            </dict>
            <key>ExpirationDate</key>
            <date>2099-01-01T00:00:00Z</date>
            <key>UUID</key>
            <string>FAKEFAKE-FAKE-FAKE-FAKE-FAKEFAKEFAKE</string>
            <key>Version</key>
            <integer>1</integer>
          </dict>
          </plist>
          EOF
          
          cp /tmp/fake.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Build iOS native with RoboVM
        run: ./gradlew ios:robovmArchive --info

      - name: Find and package IPA
        run: |
          echo "=== All .app ==="
          find . -name "*.app" -type d 2>/dev/null
          echo "=== All .ipa ==="
          find . -name "*.ipa" 2>/dev/null

          APP=$(find . -name "*.app" -type d | head -1)
          IPA=$(find . -name "*.ipa" | head -1)

          if [ -n "$IPA" ]; then
            cp "$IPA" ShatteredPD.ipa
          elif [ -n "$APP" ]; then
            mkdir -p Payload
            cp -r "$APP" Payload/
            zip -r ShatteredPD.ipa Payload/
          else
            echo "ERROR: Nothing to package"
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ShatteredPD-ios
          path: ShatteredPD.ipa
          retention-days: 7
