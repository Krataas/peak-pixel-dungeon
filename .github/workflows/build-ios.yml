name: Build iOS IPA

on:
  workflow_dispatch: # manual trigger only

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build iOS (RoboVM)
        run: ./gradlew ios:build
        env:
          ROBOVM_LICENSE: ${{ secrets.ROBOVM_LICENSE }}

      - name: Package IPA (unsigned)
        run: |
          cd ios/build/robovm
          # zip the .app into an IPA structure
          mkdir -p Payload
          cp -r *.app Payload/
          zip -r ShatteredPD.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShatteredPD-ios
          path: ios/build/robovm/ShatteredPD.ipa
          retention-days: 7
