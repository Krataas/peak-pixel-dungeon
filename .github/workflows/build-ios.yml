name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Set up Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Patch robovm to skip signing
        run: |
          printf "\nrobovm.skipSigning=true\n" >> gradle.properties
          printf "\nrobovm.iosSkipSigning=true\n" >> gradle.properties
          sed -i '' '/<provisioningProfile>/d' ios/robovm.xml
          sed -i '' '/<signingIdentity>/d' ios/robovm.xml
          echo "=== gradle.properties ==="
          cat gradle.properties
          echo "=== robovm.xml ==="
          cat ios/robovm.xml

      - name: Build iOS native with RoboVM
        run: ./gradlew ios:robovmArchive --info

      - name: Find and package IPA
        run: |
          echo "=== All .app ==="
          find . -name "*.app" -type d 2>/dev/null
          echo "=== All .ipa ==="
          find . -name "*.ipa" 2>/dev/null

          APP=$(find . -name "*.app" -type d | head -1)
          IPA=$(find . -name "*.ipa" | head -1)

          if [ -n "$IPA" ]; then
            cp "$IPA" ShatteredPD.ipa
          elif [ -n "$APP" ]; then
            mkdir -p Payload
            cp -r "$APP" Payload/
            zip -r ShatteredPD.ipa Payload/
          else
            echo "ERROR: Nothing to package"
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ShatteredPD-ios
          path: ShatteredPD.ipa
          retention-days: 7
