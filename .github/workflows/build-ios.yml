name: Build iOS IPA

on:
  workflow_dispatch: # manual trigger only

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build iOS (RoboVM)
        run: ./gradlew ios:build
        env:
          ROBOVM_LICENSE: ${{ secrets.ROBOVM_LICENSE }}

      - name: Find RoboVM output & Package IPA
        run: |
          echo "=== Searching for .app files ==="
          find . -name "*.app" -type d 2>/dev/null
          echo "=== Searching for ios build output ==="
          find . -path "*/ios/build/*" -maxdepth 6 2>/dev/null
          
          # Package whatever .app we find
          APP_PATH=$(find . -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r ShatteredPD.ipa Payload/
          else
            echo "No .app found, listing ios/build contents:"
            ls -la ios/build/ || echo "ios/build does not exist"
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShatteredPD-ios
          path: ios/build/robovm/ShatteredPD.ipa
          retention-days: 7
